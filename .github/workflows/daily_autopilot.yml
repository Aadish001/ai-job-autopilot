name: Daily AI Job Autopilot

on:
  # Run every day at 17:00 UTC (9:00 AM PST / 10:00 AM PDT)
  schedule:
    - cron: '0 17 * * *'
  # Allow manual trigger
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install LaTeX Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y texlive-latex-base texlive-fonts-recommended texlive-fonts-extra texlive-latex-extra

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Inject GCP Credentials & OAuth Token
        env:
          GCP_CREDS: ${{ secrets.GCP_SERVICE_ACCOUNT_JSON }}
          OAUTH_TOKEN: ${{ secrets.GCP_OAUTH_TOKEN_JSON }}
        run: |
          mkdir -p Req_File
          printf '%s' "$GCP_CREDS" > Req_File/gcp_service_account.json
          printf '%s' "$OAUTH_TOKEN" > Req_File/token.json

      - name: Run Pipeline
        env:
          GEMMA_API_KEY: ${{ secrets.GEMMA_API_KEY }}
          GEMMA_API_KEY_BACKUP: ${{ secrets.GEMMA_API_KEY_BACKUP }}
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
          RAPIDAPI_HOST: jsearch.p.rapidapi.com
          SMTP2GO_USERNAME: ${{ secrets.SMTP2GO_USER }}
          SMTP2GO_PASSWORD: ${{ secrets.SMTP2GO_PASS }}
          SAFE_MODE_EMAIL: ${{ secrets.SAFE_MODE_EMAIL }}
          GOOGLE_SHEETS_CREDENTIALS: Req_File/gcp_service_account.json
          GOOGLE_SHEETS_ID: ${{ secrets.GOOGLE_SHEETS_ID }}
          DRIVE_ROOT_FOLDER_ID: ${{ secrets.DRIVE_ROOT_FOLDER_ID }}
        run: |
          python main.py

      - name: Compile LaTeX to PDF
        run: echo "Skipping standalone compilation; Python script handles PDF generation and Drive upload directly."

      - name: Upload PDF Artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: tailored-resumes
          path: output/*.pdf
          retention-days: 7
